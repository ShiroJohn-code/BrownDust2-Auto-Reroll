<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無限抽自動化控制台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .stats-card {
            transition: transform 0.2s;
        }
        .stats-card:hover {
            transform: translateY(-5px);
        }
        .stream-container {
            min-height: 400px;
            background-color: #f8f9fa;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px dashed #dee2e6;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow">
        <div class="container">
            <a class="navbar-brand" href="#">🎮 無限抽自動化 (Infinite Gacha)</a>
            <span class="badge bg-warning text-dark">V1.0 Stable</span>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card stats-card text-white bg-success h-100">
                    <div class="card-body">
                        <h5 class="card-title">總抽卡次數</h5>
                        <h2 class="display-4" id="total-draws">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stats-card text-white bg-info h-100">
                    <div class="card-body">
                        <h5 class="card-title">平均 5 星數</h5>
                        <h2 class="display-4" id="avg-5star">0.0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stats-card text-white bg-warning h-100">
                    <div class="card-body">
                        <h5 class="card-title">平均 4 星數</h5>
                        <h2 class="display-4" id="avg-4star">0.0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stats-card text-white bg-danger h-100">
                    <div class="card-body">
                        <h5 class="card-title">成功率</h5>
                        <h2 class="display-4" id="success-rate">0%</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">📺 即時監控 (Live View)</h5>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="toggleStream" style="cursor: pointer;">
                            <label class="form-check-label user-select-none" for="toggleStream" style="cursor: pointer;">開啟畫面</label>
                        </div>
                    </div>
                    <div class="card-body p-2">
                        <div class="stream-container position-relative bg-dark text-white">
                            <img id="live-stream" src="" class="img-fluid w-100" style="display: none;" alt="Live Stream">
                            
                            <div id="stream-placeholder" class="text-center p-5">
                                <div class="mb-3" style="font-size: 3rem;">⚡</div>
                                <h4>即時監控已暫停</h4>
                                <p class="text-muted mb-0">關閉預覽可大幅降低 CPU 負載<br>讓掛機腳本全速運行</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 mb-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">⚙️ 門檻設定</h5>
                    </div>
                    <div class="card-body">
                        <form id="config-form">
                            <div class="mb-3">
                                <label class="form-label">最小 5 星數量</label>
                                <input type="number" class="form-control" id="min-5star" value="1" min="0" max="10">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">最小 4 星數量</label>
                                <input type="number" class="form-control" id="min-4star" value="0" min="0" max="10">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">最小總分 (Score)</label>
                                <input type="number" class="form-control" id="min-score" value="0">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">更新設定</button>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">📊 5星分布統計</h5>
                    </div>
                    <div class="card-body">
                        <div id="dist-chart" style="min-height: 200px;">
                            <ul class="list-group list-group-flush" id="dist-list">
                                <li class="list-group-item text-center text-muted">尚無數據...</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // === 串流開關邏輯 ===
        const streamImg = document.getElementById('live-stream');
        const placeholder = document.getElementById('stream-placeholder');
        const toggleBtn = document.getElementById('toggleStream');
        const streamUrl = "/video_feed"; // 後端串流網址

        toggleBtn.addEventListener('change', function() {
            if (this.checked) {
                // 開啟：賦予 src，瀏覽器開始請求
                streamImg.style.display = 'block';
                placeholder.style.display = 'none';
                streamImg.src = streamUrl;
            } else {
                // 關閉：清空 src，斷開連線
                streamImg.src = "";
                streamImg.style.display = 'none';
                placeholder.style.display = 'block';
            }
        });

        // === 數據自動更新邏輯 ===
        function updateStats() {
            fetch('/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('total-draws').textContent = data.total_draws;
                    document.getElementById('avg-5star').textContent = data.avg_5star.toFixed(2);
                    document.getElementById('avg-4star').textContent = data.avg_4star.toFixed(2);
                    document.getElementById('success-rate').textContent = data.success_rate.toFixed(1) + '%';
                    
                    // 更新分布列表
                    const distList = document.getElementById('dist-list');
                    distList.innerHTML = '';
                    if (Object.keys(data.distribution).length === 0) {
                        distList.innerHTML = '<li class="list-group-item text-center text-muted">尚無數據...</li>';
                    } else {
                        // 排序並顯示
                        Object.entries(data.distribution).sort((a,b) => b[0] - a[0]).forEach(([stars, count]) => {
                            const percent = ((count / data.total_draws) * 100).toFixed(1);
                            distList.innerHTML += `
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    <span>5星 x${stars}</span>
                                    <span>
                                        <span class="badge bg-primary rounded-pill">${count}次</span>
                                        <small class="text-muted ms-1">(${percent}%)</small>
                                    </span>
                                </li>
                            `;
                        });
                    }
                })
                .catch(err => console.error("無法獲取數據:", err));
        }

        // === 設定檔更新邏輯 ===
        document.getElementById('config-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const payload = {
                min_5star: parseInt(document.getElementById('min-5star').value),
                min_4star: parseInt(document.getElementById('min-4star').value),
                min_score: parseInt(document.getElementById('min-score').value)
            };

            fetch('/update_config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                alert('✅ 設定已更新！');
            })
            .catch(err => alert('❌ 更新失敗'));
        });

        // 每 2 秒更新一次數據 (不含畫面)
        setInterval(updateStats, 2000);
        updateStats(); // 初始化執行一次
    </script>
</body>
</html>
