<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>無限抽自動化控制台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sub: #a0a0a0;
            --accent: #0d6efd;
            --danger: #dc3545;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', sans-serif; padding-bottom: 60px; }
        
        .glass-card {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
        }
        
        .card-header {
            background-color: rgba(255,255,255,0.05);
            border-bottom: 1px solid #333;
            font-weight: 600;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-badge {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.1);
            color: #ccc;
            margin-right: 5px;
            display: inline-block;
            margin-bottom: 5px;
        }
        .platform-badge { border: 1px solid #0d6efd; color: #0d6efd; background: rgba(13, 110, 253, 0.1); }
        .ip-badge { border: 1px solid #198754; color: #198754; background: rgba(25, 135, 84, 0.1); cursor: pointer; }
        
        .live-container {
            position: relative;
            background: #000;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .live-img { width: 100%; height: auto; display: none; }
        .live-placeholder { text-align: center; color: var(--text-sub); }
        .stat-val { font-size: 1.8rem; font-weight: bold; color: #fff; }
        .stat-label { font-size: 0.8rem; color: var(--text-sub); text-transform: uppercase; }
        
        .form-control, .form-select {
            background-color: #2c2c2c; border: 1px solid #444; color: #fff;
        }
        .form-control:focus { background-color: #333; color: #fff; border-color: var(--accent); box-shadow: none; }
        .btn-run { width: 100%; padding: 12px; font-size: 1.2rem; font-weight: bold; transition: all 0.3s; }
        
        .btn-reset {
            position: absolute;
            top: 10px;
            right: 10px;
            color: var(--text-sub);
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .btn-reset:hover { background-color: rgba(220, 53, 69, 0.2); color: var(--danger); }
        .list-group-item { background-color: transparent; border-color: #333; color: #ddd; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row align-items-end mb-4">
        <div class="col-md-8">
            <h3 class="fw-bold m-0 d-inline-block">Gacha Automation</h3>
            <span class="badge bg-dark border border-secondary align-top ms-2">V1.0</span>
            
            <div class="mt-2">
                <span id="badge-platform" class="info-badge platform-badge">偵測中...</span>
                <span id="badge-local-ip" class="info-badge ip-badge" title="內網 IP">LAN: ...</span>
                <span id="badge-public-ip" class="info-badge ip-badge" title="外網 IP">WAN: ...</span>
            </div>
        </div>
        <div class="col-md-4 text-md-end mt-3 mt-md-0">
            <span id="sys-status" class="badge bg-secondary">連線中...</span>
        </div>
    </div>

    <div class="mb-4">
        <button id="btn-toggle" class="btn btn-secondary btn-run" onclick="toggleRunning()">
            載入中...
        </button>
    </div>

    <div class="row mb-3">
        <div class="col-6 col-md-3 mb-3">
            <div class="glass-card p-3 text-center h-100 position-relative">
                <div class="btn-reset" onclick="resetData()" title="重置數據">🗑️</div>
                <div class="stat-label">總抽卡次數</div>
                <div class="stat-val" id="val-total">0</div>
            </div>
        </div>
        <div class="col-6 col-md-3 mb-3">
            <div class="glass-card p-3 text-center h-100">
                <div class="stat-label">成功率</div>
                <div class="stat-val" id="val-rate">0%</div>
            </div>
        </div>
        <div class="col-6 col-md-3 mb-3">
            <div class="glass-card p-3 text-center h-100">
                <div class="stat-label">平均5星</div>
                <div class="stat-val" id="val-avg5">0.0</div>
            </div>
        </div>
        <div class="col-6 col-md-3 mb-3">
            <div class="glass-card p-3 text-center h-100">
                <div class="stat-label">平均4星</div>
                <div class="stat-val" id="val-avg4">0.0</div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-7">
            <div class="glass-card">
                <div class="card-header">
                    <span>📺 即時監控</span>
                    <div class="form-check form-switch m-0">
                        <input class="form-check-input" type="checkbox" id="toggleStream">
                        <label class="form-check-label small" for="toggleStream">預覽</label>
                    </div>
                </div>
                <div class="live-container">
                    <img id="live-view" class="live-img" src="" alt="Stream">
                    <div id="live-placeholder" class="live-placeholder">
                        <div style="font-size: 2rem;">💤</div>
                        <p class="mb-0">預覽已關閉 (省電模式)</p>
                    </div>
                </div>
            </div>

            <div class="glass-card">
                <div class="card-header">📊 5星分布</div>
                <ul class="list-group list-group-flush" id="dist-list">
                    <li class="list-group-item text-center">尚無數據</li>
                </ul>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="glass-card">
                <div class="card-header">⚙️ 門檻參數</div>
                <div class="p-3">
                    <form onsubmit="updateConfig(event)">
                        <div class="row g-2 mb-2">
                            <div class="col">
                                <label class="small text-sub">最小5星</label>
                                <input type="number" class="form-control" id="min-5star" required>
                            </div>
                            <div class="col">
                                <label class="small text-sub">最小4星</label>
                                <input type="number" class="form-control" id="min-4star" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">更新門檻</button>
                    </form>
                </div>
            </div>

            <div class="glass-card">
                <div class="card-header">
                    <span>🖥️ 系統與通知</span>
                </div>
                <div class="p-3">
                    <ul class="nav nav-pills mb-3" id="pills-tab" role="tablist">
                        <li class="nav-item"><button class="nav-link active py-1 btn-sm" data-bs-toggle="pill" data-bs-target="#tab-sys">螢幕</button></li>
                        <li class="nav-item"><button class="nav-link py-1 btn-sm" data-bs-toggle="pill" data-bs-target="#tab-tg">通知</button></li>
                    </ul>
                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="tab-sys">
                            <form onsubmit="updateSystem(event)">
                                <select class="form-select mb-3" id="monitor-idx">
                                    <option value="1">顯示器 1</option>
                                    <option value="2">顯示器 2</option>
                                    <option value="3">顯示器 3</option>
                                </select>
                                <button type="submit" class="btn btn-outline-light w-100 btn-sm">切換螢幕</button>
                            </form>
                        </div>
                        <div class="tab-pane fade" id="tab-tg">
                            <form onsubmit="updateTelegram(event)">
                                <input type="password" class="form-control mb-2" id="tg-token" placeholder="Bot Token">
                                <input type="text" class="form-control mb-2" id="tg-chatid" placeholder="Chat ID">
                                <button type="submit" class="btn btn-outline-light w-100 btn-sm">更新設定</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let streamInterval = null; // 用來存計時器
    const liveImg = document.getElementById('live-view');
    const livePlace = document.getElementById('live-placeholder');
    const toggleBtn = document.getElementById('toggleStream');
    const runBtn = document.getElementById('btn-toggle');
    const statusBadge = document.getElementById('sys-status');
    const ipLocalBadge = document.getElementById('badge-local-ip');
    const ipPublicBadge = document.getElementById('badge-public-ip');
    const platformBadge = document.getElementById('badge-platform');

    toggleBtn.addEventListener('change', function() {
        if (this.checked) {
            startPreview();
        } else {
            stopPreview();
        }
    });

    function startPreview() {
        liveImg.style.display = 'block';
        livePlace.style.display = 'none';
        
        // 立即執行一次
        updateSnapshot();

        // 設定輪詢：每 800 毫秒 (約 1.25 FPS) 更新一次
        // 這個頻率對掛機監控來說已經很足夠，且極度省效能
        streamInterval = setInterval(updateSnapshot, 800);
    }

    function stopPreview() {
        if (streamInterval) {
            clearInterval(streamInterval);
            streamInterval = null;
        }
        liveImg.src = ""; // 釋放記憶體
        liveImg.style.display = 'none';
        livePlace.style.display = 'block';
    }

    function updateSnapshot() {
        // 加上時間戳記防止瀏覽器快取 (Cache Busting)
        const timestamp = new Date().getTime();
        const newSrc = "/api/snapshot?t=" + timestamp;
        
        // 透過 Image 物件預載，避免畫面閃爍
        const tempImg = new Image();
        tempImg.onload = function() {
            liveImg.src = newSrc;
        };
        tempImg.src = newSrc;
    }

    function toggleRunning() {
        fetch('/api/toggle', { method: 'POST' })
            .then(r => r.json()).then(updateUI);
    }

    function resetData() {
        if(confirm("確定要清除所有抽卡紀錄嗎？")) {
            fetch('/api/reset', { method: 'POST' })
                .then(r => r.json()).then(d => { alert(d.message); updateUI(); });
        }
    }

    function updateConfig(e) {
        e.preventDefault();
        fetch('/api/config', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                min_5star: parseInt(document.getElementById('min-5star').value),
                min_4star: parseInt(document.getElementById('min-4star').value)
            })
        }).then(() => alert('✅ 門檻參數已更新'));
    }

    function updateSystem(e) {
        e.preventDefault();
        fetch('/api/system', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ monitor_index: parseInt(document.getElementById('monitor-idx').value) })
        }).then(() => alert('✅ 螢幕設定已更新'));
    }

    function updateTelegram(e) {
        e.preventDefault();
        fetch('/api/telegram', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                token: document.getElementById('tg-token').value,
                chat_id: document.getElementById('tg-chatid').value
            })
        }).then(() => alert('✅ 通知設定已更新'));
    }

    function updateUI() {
        fetch('/api/stats')
            .then(r => {
                if(r.ok) {
                    statusBadge.className = "badge bg-success";
                    statusBadge.textContent = "● 線上";
                    return r.json();
                }
                throw new Error("Offline");
            })
            .then(data => {
                if (data.running) {
                    runBtn.className = "btn btn-danger btn-run";
                    runBtn.textContent = "⏹ 停止自動掛機";
                } else {
                    runBtn.className = "btn btn-success btn-run";
                    runBtn.textContent = "▶ 啟動自動掛機";
                }

                document.getElementById('val-total').textContent = data.total_draws;
                document.getElementById('val-rate').textContent = data.success_rate.toFixed(1) + "%";
                document.getElementById('val-avg5').textContent = data.avg_5star.toFixed(2);
                document.getElementById('val-avg4').textContent = data.avg_4star.toFixed(2);

                if (data.system_info) {
                    ipLocalBadge.textContent = "LAN: " + data.system_info.local_ip;
                    ipPublicBadge.textContent = "WAN: " + data.system_info.public_ip;
                    platformBadge.textContent = data.system_info.platform;
                }

                // 只有在使用者沒有點擊輸入框時，才自動更新數值 (避免打字被打斷)
                if (document.activeElement.tagName !== 'INPUT') {
                    document.getElementById('min-5star').value = data.config.min_5star;
                    document.getElementById('min-4star').value = data.config.min_4star;
                    document.getElementById('monitor-idx').value = data.config.monitor_index;
                    
                    // [新增] 自動填入 Telegram 設定
                    document.getElementById('tg-token').value = data.config.tg_token;
                    document.getElementById('tg-chatid').value = data.config.tg_chat_id;
                }

                const distList = document.getElementById('dist-list');
                const dist = data.distribution;
                if (Object.keys(dist).length === 0) {
                    distList.innerHTML = '<li class="list-group-item text-center">尚無數據</li>';
                } else {
                    let html = '';
                    Object.entries(dist).sort((a,b)=>b[0]-a[0]).forEach(([star, count]) => {
                        const pct = ((count/data.total_draws)*100).toFixed(1);
                        html += `
                        <li class="list-group-item d-flex justify-content-between align-items-center py-2">
                            <span class="text-warning fw-bold">★ ${star}</span>
                            <span>${count} <small class="text-secondary">(${pct}%)</small></span>
                        </li>`;
                    });
                    distList.innerHTML = html;
                }
            })
            .catch(() => {
                statusBadge.className = "badge bg-danger";
                statusBadge.textContent = "● 離線";
            });
    }

    setInterval(updateUI, 1000);
    updateUI();
</script>
</body>
</html>
